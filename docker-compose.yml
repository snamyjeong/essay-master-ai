# Docker Compose 파일을 사용하여 여러 서비스를 정의하고 실행합니다.
version: '3.8'

services:
  # PostgreSQL 데이터베이스 서비스 정의
  db:
    image: postgres:16-alpine            # PostgreSQL 16 버전의 Alpine 이미지를 사용합니다.
    volumes:
      - postgres_data:/var/lib/postgresql/data # 데이터 영속성을 위해 볼륨을 마운트합니다.
    environment:
      POSTGRES_DB: essay_db              # 데이터베이스 이름
      POSTGRES_USER: user                # 데이터베이스 사용자 이름
      POSTGRES_PASSWORD: password        # 데이터베이스 사용자 비밀번호
    ports:
      - "5432:5432"                      # 호스트의 5432 포트를 컨테이너의 5432 포트에 매핑합니다.
    healthcheck:                         # 데이터베이스 상태 확인을 위한 헬스체크 설정
      test: ["CMD-SHELL", "pg_isready -U user -d essay_db"] # 'pg_isready' 명령어로 데이터베이스 준비 상태 확인
      interval: 5s                       # 5초마다 체크
      timeout: 5s                        # 5초 내 응답이 없으면 실패
      retries: 5                         # 5번 재시도

  # FastAPI 백엔드 서비스 정의
  backend:
    build: ./backend                     # ./backend 디렉토리의 Dockerfile을 사용하여 이미지를 빌드합니다.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000" # Alembic 마이그레이션 적용 후 Uvicorn 실행
    volumes:
      - ./backend:/app                   # 개발 중 코드 변경 사항을 반영하기 위해 볼륨을 마운트합니다.
    ports:
      - "8000:8000"                      # 호스트의 8000 포트를 컨테이너의 8000 포트에 매핑합니다.
    env_file:                            # 환경 변수 파일을 사용하여 환경 변수를 로드합니다.
      - ./backend/.env.example
    depends_on:                          # db 서비스가 먼저 시작되어야 함을 명시합니다.
      db:
        condition: service_healthy       # db 서비스가 healthy 상태가 될 때까지 기다립니다.

  # (추후 frontend 서비스 추가 예정)

# Docker 볼륨 정의: 데이터베이스 데이터의 영속성을 보장합니다.
volumes:
  postgres_data:
