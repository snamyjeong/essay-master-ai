# Alembic Configuration

# A generic, runnable configuration file for Alembic.

# Path to the directory where Alembic stores its environment scripts.
script_location = alembic

# Path to the directory where Alembic stores its versions scripts.
version_locations = %(script_location)s/versions

# The SQLAlchemy URL for your database. Alembic will use this to connect.
# This value will typically be overridden by `alembic/env.py` at runtime
# to use the configuration from `app.core.config.settings.SQLALCHEMY_DATABASE_URL`.
# For initial setup, you can set a placeholder here.
sqlalchemy.url = sqlite:///./essay_master.db

# Output a 'diff' between the current database schema and the models.
# This helps in generating migration scripts automatically.
#autogenerate = true

# The environment script `env.py` is where the core migration functionality is defined.
# It should import your database models to be used with `autogenerate`.
# Make sure your models are imported correctly in `env.py`.
# For example:
# from app.db.base import Base
# target_metadata = Base.metadata

# Set to 'true' to ensure Alembic output is more verbose.
# verbose = true

# Log configuration.
# You can customize logging levels for Alembic, SQLAlchemy, and your application.
[loggers]
keys = root,sqlalchemy,alembic

[handler_console]
class = StreamHandler
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

